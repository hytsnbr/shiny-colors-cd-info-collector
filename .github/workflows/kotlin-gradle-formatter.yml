name: KotlinGradle Code Formatter

on:
  pull_request:
    paths:
      - "**/*.gradle.kts"
    types:           
      - opened # PR作成時
      - synchronize # PRのコミット更新時

jobs:
  format-kotlinGradle:
    name: Format KotlinGradle
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: 21
          distribution: adopt
          cache: "gradle"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0f4528296b4bc09e8ae0fc7be30185a4ab435545 # v6.0.0

      - name: Spotless Kotlin Gradle Apply
        run: gradle spotlessKotlinGradleApply

      - name: Commit & Push
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: "chore: Spotlessによるコードフォーマットを適用"
